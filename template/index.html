<!doctype html>
<!-- data-theme picks the active scheme from theme.muten (dark | light). It's the default; toggle it at runtime
     to switch themes (a theme.store + a `use` fn that sets document.documentElement.dataset.theme). -->
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Muten app</title>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/app.muten"></script>
</body>
</html>
